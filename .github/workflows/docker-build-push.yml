name: Build and Push to ECR

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
         ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
         IMAGE_TAG: ${{ github.sha }}
        run: |
         docker build -t $ECR_REGISTRY/ecs-project:$IMAGE_TAG -t $ECR_REGISTRY/ecs-project:latest .
         docker push $ECR_REGISTRY/ecs-project:$IMAGE_TAG
         docker push $ECR_REGISTRY/ecs-project:latest

      - name: Health check
        run: |
          sleep 30
          curl --fail https://ecs.jabz.uk/health