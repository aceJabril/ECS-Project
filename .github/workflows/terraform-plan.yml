name: Terraform Plan

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      TF_VAR_cidr_block: ${{ secrets.TF_VAR_cidr_block }}
      TF_VAR_subnet_cidr_block_1: ${{ secrets.TF_VAR_subnet_cidr_block_1 }}
      TF_VAR_subnet_cidr_block_2: ${{ secrets.TF_VAR_subnet_cidr_block_2 }}
      TF_VAR_az_1: ${{ secrets.TF_VAR_az_1 }}
      TF_VAR_az_2: ${{ secrets.TF_VAR_az_2 }}
      TF_VAR_domain: ${{ secrets.TF_VAR_domain }}
      TF_VAR_private_subnet_cidr_block_1: ${{ secrets.TF_VAR_private_subnet_cidr_block_1 }}
      TF_VAR_private_subnet_cidr_block_2: ${{ secrets.TF_VAR_private_subnet_cidr_block_2 }}
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan